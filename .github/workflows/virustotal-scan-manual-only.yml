name: Manual VirusTotal Scan

on:
  workflow_dispatch:

jobs:
  scan:
    name: VirusTotal scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compile list of files to scan
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p vt-report

          {
            echo "# VirusTotal Scanned Files"
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_RUN_ID"
            echo
            echo "## Files"
            echo
          } > vt-report/scanned-files.md

          git ls-files \
            ':!:node_modules/**' \
            ':!:.github/**' \
            ':!:dist/**' \
            ':!:build/**' \
            ':!:DerivedData/**' \
            ':!:*.md' \
            ':!:*.txt' \
            ':!:*.yml' \
            ':!:*.yaml' \
            ':!:*.json' \
            | sort > vt-report/scanned-files.txt

          FILE_COUNT="$(wc -l < vt-report/scanned-files.txt | tr -d ' ')"

          while IFS= read -r file; do
            echo "- \`$file\`" >> vt-report/scanned-files.md
          done < vt-report/scanned-files.txt

          {
            echo
            echo "Total files listed for scan: $FILE_COUNT"
          } >> vt-report/scanned-files.md

          echo "Files listed for scan: $FILE_COUNT"

      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            **/*
            !.git/**
            !node_modules/**
            !.github/**
            !dist/**
            !build/**
            !DerivedData/**
            !*.md
            !*.txt
            !*.yml
            !*.yaml
            !*.json

      - name: Upload scanned file list
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: virustotal-scanned-file-list
          path: vt-report/

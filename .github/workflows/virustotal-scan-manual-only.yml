name: Manual VirusTotal Scan

on:
  workflow_dispatch:

jobs:
  scan:
    name: VirusTotal scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compile list of files to scan
        shell: bash
        run: |
          set -euo pipefail

          REPORT_DIR="$RUNNER_TEMP/vt-report"
          mkdir -p "$REPORT_DIR"

          {
            echo "# VirusTotal Scanned Files"
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_RUN_ID"
            echo
            echo "## Files"
            echo
          } > "$REPORT_DIR/scanned-files.md"

          git ls-files \
            ':!:.github/**' \
            ':!:node_modules/**' \
            ':!:dist/**' \
            ':!:build/**' \
            ':!:DerivedData/**' \
            ':!:*.md' \
            ':!:*.txt' \
            ':!:*.yml' \
            ':!:*.yaml' \
            ':!:*.json' \
            ':!:*.png' \
            ':!:*.jpg' \
            ':!:*.jpeg' \
            ':!:*.gif' \
            ':!:*.webp' \
            ':!:*.ico' \
            ':!:*.icns' \
            ':!:*.pdf' \
            ':!:*.zip' \
            ':!:*.dmg' \
            ':!:*.xcuserstate' \
            ':!:*.xcuserdata/**' \
            | sort > "$REPORT_DIR/scanned-files.txt"

          FILE_COUNT="$(wc -l < "$REPORT_DIR/scanned-files.txt" | tr -d ' ')"

          while IFS= read -r file; do
            echo "- \`$file\`" >> "$REPORT_DIR/scanned-files.md"
          done < "$REPORT_DIR/scanned-files.txt"

          {
            echo
            echo "Total files listed for scan: $FILE_COUNT"
          } >> "$REPORT_DIR/scanned-files.md"

          echo "Files listed for scan: $FILE_COUNT"

      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4
          files: |
            **/*
            !.git/**
            !.github/**
            !node_modules/**
            !dist/**
            !build/**
            !DerivedData/**
            !**/*.md
            !**/*.txt
            !**/*.yml
            !**/*.yaml
            !**/*.json
            !**/*.png
            !**/*.jpg
            !**/*.jpeg
            !**/*.gif
            !**/*.webp
            !**/*.ico
            !**/*.icns
            !**/*.pdf
            !**/*.zip
            !**/*.dmg
            !**/*.xcuserstate
            !**/*.xcuserdata/**

      - name: Upload scanned file list
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: virustotal-scanned-file-list
          path: ${{ runner.temp }}/vt-report/

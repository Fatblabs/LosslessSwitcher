name: Build and Release macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CONFIGURATION: Release
  XCODE_PROJECT: LosslessSwitcher.xcodeproj
  XCODE_SCHEME: LosslessSwitcher
  APP_NAME: LosslessSwitcher

jobs:
  build-and-release:
    name: Build macOS app and publish GitHub release
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Debug Xcode project
        shell: bash
        run: |
          set -euo pipefail

          echo "Current directory:"
          pwd

          echo "Repository files:"
          ls -la

          echo "Git ref:"
          echo "$GITHUB_REF"
          echo "$GITHUB_REF_NAME"

          echo "Finding Xcode projects:"
          find . -maxdepth 4 -name "*.xcodeproj" -print

          echo "Checking configured project:"
          ls -la "$XCODE_PROJECT"

          echo "Checking project.pbxproj:"
          test -f "$XCODE_PROJECT/project.pbxproj"
          ls -la "$XCODE_PROJECT/project.pbxproj"

          echo "Available Xcode schemes:"
          xcodebuild -list -project "$XCODE_PROJECT"

      - name: Build macOS app
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="manual-build-${GITHUB_RUN_NUMBER}"
          fi

          VERSION="${TAG_NAME#v}"
          DERIVED_DATA_PATH="$RUNNER_TEMP/DerivedData"

          echo "Building tag/name: $TAG_NAME"
          echo "Version: $VERSION"
          echo "Project: $XCODE_PROJECT"
          echo "Scheme: $XCODE_SCHEME"
          echo "Configuration: $CONFIGURATION"

          xcodebuild clean build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO

          APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products/$CONFIGURATION" -maxdepth 1 -name "$APP_NAME.app" -type d | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find built app named $APP_NAME.app"
            echo "Available .app bundles:"
            find "$DERIVED_DATA_PATH/Build/Products" -name "*.app" -type d -print || true
            exit 1
          fi

          echo "Built app:"
          echo "$APP_PATH"

          mkdir -p release

          ZIP_NAME="${APP_NAME}-${TAG_NAME}-macOS.zip"
          ZIP_PATH="release/$ZIP_NAME"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          shasum -a 256 "$ZIP_PATH" > "$ZIP_PATH.sha256"

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=$ZIP_PATH.sha256" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: LosslessSwitcher-macOS-build
          path: |
            ${{ env.ZIP_PATH }}
            ${{ env.CHECKSUM_PATH }}

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_TITLE="$APP_NAME $TAG_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release already exists for $TAG_NAME. Uploading assets with overwrite."
            gh release upload "$TAG_NAME" \
              "$ZIP_PATH" \
              "$CHECKSUM_PATH" \
              --clobber
          else
            echo "Creating release for $TAG_NAME."
            gh release create "$TAG_NAME" \
              "$ZIP_PATH" \
              "$CHECKSUM_PATH" \
              --title "$RELEASE_TITLE" \
              --notes "Automated macOS build for $APP_NAME $TAG_NAME." \
              --verify-tag
          fi

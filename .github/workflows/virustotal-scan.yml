name: VirusTotal Scan

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  test-scan:
    runs-on: ubuntu-latest
    env:
      # Ensures compatibility with the latest Ubuntu runners
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Unique Build Artifacts
        run: |
          mkdir -p dist build
          # We add the run_id so the file content (and hash) is different every time you run it.
          # This prevents VirusTotal from throwing a 409 Conflict error.
          echo "Unique build for run ${{ github.run_id }}" > dist/app.zip
          echo "Unique executable for run ${{ github.run_id }}" > build/app.exe

      - name: VirusTotal Scan
        uses: cssnr/virustotal-action@v1
        id: vt
        continue-on-error: true
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          rate_limit: 4
          summary: true
          file_globs: |
            dist/*.zip
            build/*.exe

      - name: Display Scan Results
        if: always()
        run: |
          echo "### 🛡️ VirusTotal Scan Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vt.outcome }}" == "success" ]; then
            echo "✅ Scan submitted successfully." >> $GITHUB_STEP_SUMMARY
            echo "Check the VirusTotal dashboard or the 'VirusTotal Scan' step logs for direct analysis links." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ The scan step did not complete successfully." >> $GITHUB_STEP_SUMMARY
            echo "Possible reasons:" >> $GITHUB_STEP_SUMMARY
            echo "- **409 Conflict:** The file hash already exists or is being processed." >> $GITHUB_STEP_SUMMARY
            echo "- **Rate Limit:** Standard VT API keys are limited to 4 requests per minute." >> $GITHUB_STEP_SUMMARY
            echo "- **Secret Error:** Ensure 'VT_API_KEY' is correctly set in your Repo Secrets." >> $GITHUB_STEP_SUMMARY
          fi

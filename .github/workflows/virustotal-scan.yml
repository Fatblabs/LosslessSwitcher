name: VirusTotal Scan

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  test-scan:
    runs-on: ubuntu-latest
    env:
      [cite_start]FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Ensures compatibility with Node.js 24 [cite: 9]
    steps:
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 1]

      # This ensures the directories and files exist so the action doesn't fail with "No files to process"
      - name: Prepare Build Artifacts
        run: |
          mkdir -p dist build
          echo "test data" > dist/app.zip
          echo "test data" > build/app.exe

      - name: VirusTotal Scan
        [cite_start]uses: cssnr/virustotal-action@v1 [cite: 9]
        id: vt
        continue-on-error: true # FIX: Prevents job failure if a file is already in the VT queue (409 Conflict)
        with:
          [cite_start]vt_api_key: ${{ secrets.VT_API_KEY }} [cite: 9]
          [cite_start]rate_limit: 4 [cite: 9]
          [cite_start]summary: true [cite: 9]
          file_globs: |
            dist/*.zip
            build/*.exe

      - name: Display Test Result
        [cite_start]if: always() # Ensures results or warnings are shown even if the scan step has issues [cite: 12]
        run: |
          echo "### 🛡️ VirusTotal Scan Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vt.outcome }}" == "success" ]; then
            echo "Analysis Link(s):" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.vt.outputs.results }}" | sed 's/,/\n/g' | sed 's/^/ - /' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Scan skipped or file already submitted (409 Conflict)." >> $GITHUB_STEP_SUMMARY
          fi [cite: 12, 13, 14, 15]

name: VirusTotal Scan

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  test-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ensures the directories and files exist
      - name: Prepare Build Artifacts
        run: |
          mkdir -p dist build
          echo "test data" > dist/app.zip
          echo "test data" > build/app.exe

      - name: VirusTotal Scan
        uses: cssnr/virustotal-action@v1
        id: vt
        continue-on-error: true
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          rate_limit: 4
          summary: true
          file_globs: |
            dist/*.zip
            build/*.exe

      - name: Display Test Result
        if: always()
        run: |
          echo "### 🛡️ VirusTotal Scan Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vt.outcome }}" == "success" ]; then
            echo "Analysis Link(s):" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.vt.outputs.results }}" | tr ',' '\n' | sed 's/^/ - /' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Scan skipped or file already submitted (409 Conflict)." >> $GITHUB_STEP_SUMMARY
          fi

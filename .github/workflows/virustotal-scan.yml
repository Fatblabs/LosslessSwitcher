name: VirusTotal Single File Test
on:
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  test-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Future-proofs the action
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: VirusTotal Scan (Single File)
        uses: cssnr/virustotal-action@v1
        id: vt
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          rate_limit: 4
          summary: true
          # REPLACE 'README.md' with any single file path in your repo
          file_globs: |
            README.md

      - name: Display Test Result
        if: always()
        run: |
          echo "### 🛡️ Test Scan Result" >> $GITHUB_STEP_SUMMARY
          echo "Analysis Link:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.vt.outputs.results }}" | sed 's/,/\n/g' | sed 's/^/ - /' >> $GITHUB_STEP_SUMMARY

name: Manual VirusTotal Scan
on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    # This environment variable forces the use of Node 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: VirusTotal Scan
        uses: cssnr/virustotal-action@v1
        id: vt
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          rate_limit: 4
          summary: true
          file_globs: |
            **/*
            ! .git/**
            ! node_modules/**

      - name: Display Final List
        if: always()
        run: |
          echo "### 🛡️ Compiled Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.vt.outputs.results }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
